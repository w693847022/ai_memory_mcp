services:
  mcp-memory-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: mcp-memory-server
    restart: unless-stopped
    # Linux: 使用宿主机用户运行，避免文件权限问题
    # Windows: 不支持此配置，在 .env 中将 USER_ID 留空
    user: "${USER_ID:-1000}:${GROUP_ID:-1000}"
    ports:
      - "${MCP_PORT:-8000}:8000"
    environment:
      - MCP_TRANSPORT=${MCP_TRANSPORT:-streamable-http}
      - MCP_HOST=${MCP_HOST:-0.0.0.0}
      - MCP_PORT=${MCP_PORT:-8000}
      - MCP_LOG_LEVEL=${MCP_LOG_LEVEL:-INFO}
      - MCP_STORAGE_DIR=${MCP_STORAGE_DIR:-/app/.project_memory_ai}
    volumes:
      # 挂载项目记忆数据目录（持久化）- 支持环境变量配置
      - ${MCP_DATA_HOST_PATH:-~/.project_memory_ai}:/app/.project_memory_ai
      # 挂载源代码（开发模式热更新）
      - ../src:/app/src:ro
      - ../run.py:/app/run.py:ro
    networks:
      - mcp-network
    # 健康检查已禁用 - MCP SSE端点需要session ID，无法简单检查
    # healthcheck:
    #   test: ["CMD", "python", "-c", "import urllib.request; req = urllib.request.Request('http://localhost:8000/mcp', headers={'Accept': 'text/event-stream'}); urllib.request.urlopen(req, timeout=5)"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 10s
    labels:
      - "com.mcp-memory.description=Project Memory MCP Server"
      - "com.mcp-memory.version=1.0.0"

  fastapi-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.fastapi
    container_name: fastapi-server
    restart: unless-stopped
    user: "${USER_ID:-1000}:${GROUP_ID:-1000}"
    ports:
      - "${FASTAPI_PORT:-8001}:8001"
    environment:
      - PYTHONUNBUFFERED=1
      - MCP_SERVER_URL=${MCP_SERVER_URL:-http://mcp-memory-server:8000/mcp}
      # 日志配置
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_DIR=/app/logs
      - LOG_MAX_BYTES=${LOG_MAX_BYTES:-10485760}
      - LOG_BACKUP_COUNT=${LOG_BACKUP_COUNT:-5}
    volumes:
      # 共享数据卷 - 访问 MCP Server 的数据
      - ${MCP_DATA_HOST_PATH:-~/.project_memory_ai}:/app/.project_memory_ai:ro
      # 挂载日志目录（持久化）
      - ${LOG_HOST_PATH:-~/.project_memory_ai/logs}:/app/logs
      # 挂载源代码（开发模式热更新）
      - ../src:/app/src:ro
    networks:
      - mcp-network
    depends_on:
      - mcp-memory-server
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8001/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "com.mcp-memory.description=FastAPI REST API Server"
      - "com.mcp-memory.version=1.0.0"

networks:
  mcp-network:
    driver: bridge
    name: mcp-memory-network
